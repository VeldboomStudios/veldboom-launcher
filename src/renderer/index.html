<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src https: data:; style-src 'self' 'unsafe-inline'" />
  <title>Veldboom Launcher</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">V</div>
        <div class="brand-name">VELDBOOM<span>STUDIOS</span></div>
      </div>
      <nav>
        <button class="nav-item active" data-view="library">Library</button>
        <button class="nav-item" data-view="files">Files</button>
      </nav>
      <div class="sidebar-footer">
        <div id="user-box" class="user-box">
          <button id="signin-btn" class="btn btn-primary btn-block">Sign in with GitHub</button>
        </div>
        <span id="launcher-version"></span>
      </div>
    </aside>

    <main class="content">
      <section id="view-library">
        <header class="topbar">
          <h1>Library</h1>
          <button id="refresh-btn" class="btn btn-ghost" title="Refresh catalog">&#x21bb; Refresh</button>
        </header>
        <div id="status-message" class="status-message hidden"></div>
        <div id="game-grid" class="game-grid"></div>
        <div id="empty-state" class="empty-state hidden">
          <p>No games yet — new releases will show up here automatically.</p>
        </div>
      </section>

      <section id="view-files" class="hidden">
        <header class="topbar">
          <h1>Files</h1>
          <button id="files-refresh-btn" class="btn btn-ghost">&#x21bb; Refresh</button>
        </header>
        <div id="files-status" class="status-message hidden"></div>
        <div id="files-list" class="files-list"></div>
        <div id="files-empty" class="empty-state hidden">
          <p>No files available.</p>
        </div>
      </section>
    </main>
  </div>

  <div id="detail-overlay" class="overlay hidden">
    <div class="detail-card">
      <button id="detail-close" class="detail-close">&times;</button>
      <div class="detail-hero" id="detail-hero"></div>
      <div class="detail-body">
        <h2 id="detail-title"></h2>
        <p id="detail-version" class="detail-version"></p>
        <p id="detail-desc"></p>
        <div id="detail-progress" class="progress hidden">
          <div class="progress-bar"><div id="detail-progress-fill" class="progress-fill"></div></div>
          <span id="detail-progress-label"></span>
        </div>
        <div class="detail-actions" id="detail-actions"></div>
      </div>
    </div>
  </div>

  <div id="login-overlay" class="overlay hidden">
    <div class="detail-card login-card">
      <button id="login-close" class="detail-close">&times;</button>
      <div class="detail-body">
        <h2>Sign in with GitHub</h2>
        <p class="login-hint">A browser window has opened. Enter this code there to sign in:</p>
        <div id="login-code" class="login-code">····-····</div>
        <p id="login-status" class="login-status">Waiting for you to approve in the browser…</p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
